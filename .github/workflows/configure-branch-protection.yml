name: Configure Branch Protection

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/settings.yml"
      - ".github/workflows/configure-branch-protection.yml"

permissions:
  contents: read
  actions: read

jobs:
  configure:
    name: Configure Branch Protection Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure main branch protection
        run: |
          gh api repos/${{ github.repository }}/branches/main/protection \
            --input - <<< '{
              "required_status_checks": {
                "strict": true,
                "contexts": ["test (18.x)", "test (20.x)", "lint", "type-check", "coverage"]
              },
              "required_pull_request_reviews": {
                "dismissal_restrictions": {},
                "require_code_owner_reviews": false,
                "require_last_push_approval": false,
                "required_approving_review_count": 1,
                "dismiss_stale_reviews": true
              },
              "required_linear_history": false,
              "allow_force_pushes": false,
              "allow_deletions": false,
              "require_signed_commits": false,
              "enforce_admins": false
            }'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure develop branch protection
        run: |
          gh api repos/${{ github.repository }}/branches/develop/protection \
            --input - <<< '{
              "required_status_checks": {
                "strict": true,
                "contexts": ["test (18.x)", "test (20.x)", "lint", "type-check"]
              },
              "required_pull_request_reviews": {
                "dismissal_restrictions": {},
                "require_code_owner_reviews": false,
                "require_last_push_approval": false,
                "required_approving_review_count": 1,
                "dismiss_stale_reviews": true
              },
              "required_linear_history": false,
              "allow_force_pushes": false,
              "allow_deletions": false,
              "require_signed_commits": false,
              "enforce_admins": false
            }'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log configuration status
        run: |
          echo "✅ Branch protection rules configured successfully!"
          echo "📋 Protected branches:"
          echo "  - main (requires 1+ approval + status checks)"
          echo "  - develop (requires 1+ approval + status checks)"
