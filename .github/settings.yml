# Repository Settings Configuration
# This file is used by the Probot Settings App to automatically configure repository settings
# Install: https://github.com/apps/settings

repository:
  # General settings
  name: node-aws-tfm
  description: A comprehensive Node.js AWS module with Terraform support
  homepage: https://github.com/arvinlml/node_aws_tfm
  private: false
  visibility: public
  has_issues: true
  has_projects: true
  has_downloads: true
  has_wiki: false
  is_template: false

  # Topics for discoverability
  topics:
    - aws
    - terraform
    - nodejs
    - typescript
    - lambda
    - s3
    - dynamodb
    - step-functions
    - serverless

  # Default branch
  default_branch: main

  # Merge strategy
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true
  allow_auto_merge: true
  delete_branch_on_merge: true
  merge_commit_title: PR_NUMBER
  merge_commit_message: PR_BODY
  squash_merge_commit_title: PR_NUMBER
  squash_merge_commit_message: PR_BODY

  # Advanced settings
  enable_vulnerability_alerts: true
  enable_automated_security_fixes: true
  archived: false

# Branch Protection Rules
branches:
  # Main production branch
  - name: main
    # Protection settings
    protection:
      required_status_checks:
        # Require status checks to pass before merging
        strict: true
        # List of required CI status checks
        contexts:
          - "test (18.x)"
          - "test (20.x)"
          - "lint"
          - "type-check"
          - "coverage"

      # Require pull request reviews
      required_pull_request_reviews:
        dismissal_restrictions:
          # Users who can dismiss reviews (optional)
          users: []
          teams: []
        # Require approval before merge
        require_code_owner_reviews: false
        # Require approval from code owners
        require_last_push_approval: false
        # Number of required approvals
        required_approving_review_count: 1
        # Dismiss stale reviews when new commits are pushed
        dismiss_stale_reviews: true

      # Require branches to be up to date
      required_linear_history: false

      # Allow force pushes
      allow_force_pushes: false

      # Allow deletions
      allow_deletions: false

      # Require signed commits
      require_signed_commits: false

      # Enforce admins
      enforce_admins: false

      # Restrictions (optional - specify who can push)
      restrictions:
        users: []
        teams: []
        apps: []

  # Development branch
  - name: develop
    protection:
      required_status_checks:
        strict: true
        contexts:
          - "test (18.x)"
          - "test (20.x)"
          - "lint"
          - "type-check"

      required_pull_request_reviews:
        require_code_owner_reviews: false
        require_last_push_approval: false
        required_approving_review_count: 1
        dismiss_stale_reviews: true

      required_linear_history: false
      allow_force_pushes: false
      allow_deletions: false
      require_signed_commits: false
      enforce_admins: false

# Pull Request settings
pull_requests:
  # Auto-merge settings
  auto_merge_enabled: false

# Issue labels
labels:
  - name: "bug"
    color: "d73a49"
    description: "Something isn't working"
  - name: "enhancement"
    color: "a2eeef"
    description: "New feature or request"
  - name: "documentation"
    color: "0075ca"
    description: "Improvements or additions to documentation"
  - name: "good first issue"
    color: "7057ff"
    description: "Good for newcomers"
  - name: "help wanted"
    color: "008672"
    description: "Extra attention is needed"
  - name: "wontfix"
    color: "ffffff"
    description: "This will not be worked on"
  - name: "dependencies"
    color: "0366d6"
    description: "Pull requests that update dependencies"
  - name: "security"
    color: "ee0701"
    description: "Security related issues or fixes"

# Collaborators (optional)
# collaborators:
#   - login: username
#     permission: push
